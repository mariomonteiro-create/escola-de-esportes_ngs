services:
  - type: web
    name: sge-masterpro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: sge-data
      mountPath: /opt/render/project/src
      sizeGB: 1
